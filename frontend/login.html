<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Password Manager</title>
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    integrity="sha384-XGjxtQfXaH2tnPFa9x+ruJTuLE3Aa6LhHSWRr1XeTyhezb4abCG4ccI5AkVDxqC+"
    crossorigin="anonymous"
  />
  <link rel="stylesheet" href="style.css?v=2" />
</head>
<body>

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-12 col-sm-9 col-md-7 col-lg-5">

      <div class="text-center mb-4">
        <i class="bi bi-shield-lock-fill text-primary" style="font-size:3rem;"></i>
        <h1 class="h3 mt-2 fw-bold">Password Manager</h1>
        <p class="text-muted mb-0">Secure storage for your credentials.</p>
      </div>

      <div class="card shadow-sm">
        <div class="card-body p-4">

          <!-- Tab nav -->
          <ul class="nav nav-tabs mb-4" id="auth-tabs" role="tablist">
            <li class="nav-item" role="presentation">
              <button class="nav-link active" id="tab-login-btn"
                data-bs-toggle="tab" data-bs-target="#tab-login"
                type="button" role="tab" aria-controls="tab-login" aria-selected="true">
                <i class="bi bi-box-arrow-in-right me-1"></i>Login
              </button>
            </li>
            <li class="nav-item" role="presentation">
              <button class="nav-link" id="tab-register-btn"
                data-bs-toggle="tab" data-bs-target="#tab-register"
                type="button" role="tab" aria-controls="tab-register" aria-selected="false">
                <i class="bi bi-person-plus me-1"></i>Register New User
              </button>
            </li>
          </ul>

          <div class="tab-content">

            <!-- Login tab -->
            <div class="tab-pane fade show active" id="tab-login" role="tabpanel" aria-labelledby="tab-login-btn">
              <div id="login-alert" role="alert" aria-live="polite"></div>
              <form id="login-form" novalidate>
                <div class="mb-3">
                  <label for="login-username" class="form-label fw-semibold">Username</label>
                  <input
                    type="text"
                    id="login-username"
                    name="username"
                    class="form-control"
                    autocomplete="username"
                    required
                    minlength="3"
                    maxlength="64"
                  />
                  <div class="invalid-feedback">Username is required.</div>
                </div>
                <div class="mb-4">
                  <label for="login-password" class="form-label fw-semibold">Password</label>
                  <div class="input-group">
                    <input
                      type="password"
                      id="login-password"
                      name="password"
                      class="form-control"
                      autocomplete="current-password"
                      required
                    />
                    <button type="button" class="btn btn-outline-secondary" id="login-toggle-pw"
                      title="Toggle password visibility" aria-label="Show password">
                      <i class="bi bi-eye"></i>
                    </button>
                  </div>
                  <div class="invalid-feedback">Password is required.</div>
                </div>
                <button type="submit" id="btn-login" class="btn btn-primary w-100">
                  <span id="login-spinner" class="spinner-border spinner-border-sm d-none me-2"
                    role="status" aria-hidden="true"></span>
                  <i class="bi bi-box-arrow-in-right me-1"></i> Login
                </button>
              </form>
            </div>

            <!-- Register tab -->
            <div class="tab-pane fade" id="tab-register" role="tabpanel" aria-labelledby="tab-register-btn">
              <div id="register-alert" role="alert" aria-live="polite"></div>
              <form id="register-form" novalidate>
                <div class="mb-3">
                  <label for="reg-username" class="form-label fw-semibold">Username</label>
                  <input
                    type="text"
                    id="reg-username"
                    name="username"
                    class="form-control"
                    autocomplete="username"
                    required
                    minlength="3"
                    maxlength="64"
                    pattern="[a-zA-Z0-9_\-\.]+"
                  />
                  <div class="invalid-feedback">3–64 characters, letters/numbers/_ -. only.</div>
                </div>
                <div class="mb-3">
                  <label for="reg-password" class="form-label fw-semibold">Password</label>
                  <div class="input-group">
                    <input
                      type="password"
                      id="reg-password"
                      name="password"
                      class="form-control"
                      autocomplete="new-password"
                      required
                      minlength="12"
                      maxlength="20"
                    />
                    <button type="button" class="btn btn-outline-secondary" id="reg-toggle-pw"
                      title="Toggle password visibility" aria-label="Show password">
                      <i class="bi bi-eye"></i>
                    </button>
                  </div>
                  <div class="form-text">12–20 characters, must include uppercase, lowercase, number, and special character.</div>
                  <div class="invalid-feedback">Password must be 12–20 characters.</div>
                </div>
                <div class="mb-4">
                  <label for="reg-confirm" class="form-label fw-semibold">Confirm Password</label>
                  <input
                    type="password"
                    id="reg-confirm"
                    name="confirm"
                    class="form-control"
                    autocomplete="new-password"
                    required
                  />
                  <div class="invalid-feedback" id="reg-confirm-feedback">Passwords must match.</div>
                </div>

                <button type="submit" id="btn-register" class="btn btn-primary w-100">
                  <span id="register-spinner" class="spinner-border spinner-border-sm d-none me-2"
                    role="status" aria-hidden="true"></span>
                  <i class="bi bi-person-plus me-1"></i> Register
                </button>
              </form>
            </div>

          </div><!-- /.tab-content -->
        </div><!-- /.card-body -->
      </div><!-- /.card -->

    </div>
  </div>
</div>

<script
  src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
  integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
  crossorigin="anonymous">
</script>
<script src="login.js?v=1"></script>
</body>
</html>
