<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Change Password — Password Manager</title>
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    integrity="sha384-XGjxtQfXaH2tnPFa9x+ruJTuLE3Aa6LhHSWRr1XeTyhezb4abCG4ccI5AkVDxqC+"
    crossorigin="anonymous"
  />
  <link rel="stylesheet" href="style.css?v=2" />
</head>
<body>

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-12 col-sm-9 col-md-7 col-lg-5">

      <div class="text-center mb-4">
        <i class="bi bi-key-fill text-primary" style="font-size:3rem;"></i>
        <h1 class="h3 mt-2 fw-bold">Change Password</h1>
        <p class="text-muted mb-0">You must set a new password before continuing.</p>
      </div>

      <div class="card shadow-sm">
        <div class="card-body p-4">

          <div id="change-alert" role="alert" aria-live="polite"></div>

          <form id="change-form" novalidate>

            <div class="mb-3">
              <label for="current-password" class="form-label fw-semibold">Current Password</label>
              <div class="input-group">
                <input
                  type="password"
                  id="current-password"
                  name="currentPassword"
                  class="form-control"
                  autocomplete="current-password"
                  required
                />
                <button type="button" class="btn btn-outline-secondary" id="toggle-current"
                  title="Toggle visibility" aria-label="Show current password">
                  <i class="bi bi-eye"></i>
                </button>
              </div>
              <div class="invalid-feedback">Current password is required.</div>
            </div>

            <div class="mb-3">
              <label for="new-password" class="form-label fw-semibold">New Password</label>
              <div class="input-group">
                <input
                  type="password"
                  id="new-password"
                  name="password"
                  class="form-control"
                  autocomplete="new-password"
                  required
                  minlength="12"
                  maxlength="20"
                />
                <button type="button" class="btn btn-outline-secondary" id="toggle-new"
                  title="Toggle visibility" aria-label="Show new password">
                  <i class="bi bi-eye"></i>
                </button>
              </div>
              <div class="form-text">12–20 characters, must include uppercase, lowercase, number, and special character.</div>
              <div class="invalid-feedback">Password must be 12–20 characters.</div>
            </div>

            <div class="mb-4">
              <label for="confirm-password" class="form-label fw-semibold">Confirm New Password</label>
              <input
                type="password"
                id="confirm-password"
                name="confirm"
                class="form-control"
                autocomplete="new-password"
                required
              />
              <div class="invalid-feedback" id="confirm-feedback">Passwords must match.</div>
            </div>

            <button type="submit" id="btn-change" class="btn btn-primary w-100">
              <span id="change-spinner" class="spinner-border spinner-border-sm d-none me-2"
                role="status" aria-hidden="true"></span>
              <i class="bi bi-check-circle me-1"></i> Set New Password
            </button>

          </form>

        </div>
      </div>

    </div>
  </div>
</div>

<script
  src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
  integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
  crossorigin="anonymous">
</script>
<script src="change-password.js?v=1"></script>
</body>
</html>
